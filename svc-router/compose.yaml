services:
  router:
    build: .
    container_name: svc-router
    ports:
      - "127.0.0.1:8203:8203"
    environment:
      - INTERNAL_KEY=${INTERNAL_KEY:?INTERNAL_KEY obrigatoria (fail-closed)}
      - ALLOW_OPEN_ACCESS=${ALLOW_OPEN_ACCESS:-0}
      - ROUTE_THRESHOLD=${ROUTE_THRESHOLD:-0.45}
      - HYBRID_ENABLED=${HYBRID_ENABLED:-1}
      - LLM_ENABLED=${LLM_ENABLED:-0}
      - LLM_URL=${LLM_URL:-}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-120}
      - OTEL_ENABLED=${OTEL_ENABLED:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./models:/app/models
    restart: unless-stopped
