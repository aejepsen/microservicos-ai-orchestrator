services:
  inference:
    build: .
    container_name: svc-inference
    ports:
      - "127.0.0.1:8202:8202"
    environment:
      - INTERNAL_KEY=${INTERNAL_KEY:?INTERNAL_KEY obrigatoria (fail-closed)}
      - ALLOW_OPEN_ACCESS=${ALLOW_OPEN_ACCESS:-0}
      - BACKEND=${BACKEND:-ollama}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:11434}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-}
      - CIRCUIT_FAIL_THRESHOLD=${CIRCUIT_FAIL_THRESHOLD:-3}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-120}
      - OTEL_ENABLED=${OTEL_ENABLED:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
