openapi: 3.1.0
info:
  title: svc-inference
  version: 1.0.0
  description: >
    Fachada de inferência LLM OpenAI-compatível sobre backend local (Ollama).
    Chat completions (bloqueante + streaming SSE), listagem de modelos, usage
    de tokens na fonte, OTel GenAI, circuit breaker. Stateless; auth interna.

servers:
  - url: http://localhost:8202

components:
  securitySchemes:
    internalKey:
      type: apiKey
      in: header
      name: X-Internal-Key
  schemas:
    BusinessError:
      type: object
      required: [error, detail, rule]
      properties:
        error: { type: string }
        detail: { type: string }
        rule: { type: string }
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role: { type: string, enum: [system, user, assistant] }
        content: { type: string }
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model: { type: string }
        messages:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/ChatMessage" }
        stream: { type: boolean, default: false }
        temperature: { type: number, default: 0.0 }
        max_tokens: { type: [integer, "null"] }
    Usage:
      type: object
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }
    Choice:
      type: object
      required: [index, message, finish_reason]
      properties:
        index: { type: integer }
        message: { $ref: "#/components/schemas/ChatMessage" }
        finish_reason: { type: [string, "null"] }
    ChatCompletionResponse:
      type: object
      required: [id, object, model, choices, usage]
      properties:
        id: { type: string }
        object: { type: string, enum: [chat.completion] }
        model: { type: string }
        choices:
          type: array
          items: { $ref: "#/components/schemas/Choice" }
        usage: { $ref: "#/components/schemas/Usage" }
    ModelList:
      type: object
      required: [object, data]
      properties:
        object: { type: string, enum: [list] }
        data:
          type: array
          items:
            type: object
            required: [id, object]
            properties:
              id: { type: string }
              object: { type: string, enum: [model] }
    Health:
      type: object
      required: [status, version, deps]
      properties:
        status: { type: string, enum: [ok, degraded] }
        version: { type: string }
        deps:
          type: object
          required: [backend, circuit]
          properties:
            backend: { type: string, enum: [ok, down] }
            circuit: { type: string, enum: [closed, open, half_open] }
    Metrics:
      type: object
      required: [source, requests_total, tokens_input_total, tokens_output_total, ttft_ms_p95, latency_ms_p95, circuit_state]
      properties:
        source: { type: string, enum: [live] }
        requests_total: { type: integer }
        tokens_input_total: { type: integer }
        tokens_output_total: { type: integer }
        ttft_ms_p50: { type: number }
        ttft_ms_p95: { type: number }
        latency_ms_p50: { type: number }
        latency_ms_p95: { type: number }
        circuit_state: { type: string, enum: [closed, open, half_open] }

paths:
  /v1/chat/completions:
    post:
      operationId: chatCompletions
      security: [{ internalKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatCompletionRequest" }
      responses:
        "200":
          description: >
            completion. stream=false → ChatCompletionResponse (JSON).
            stream=true → text/event-stream de chunks OpenAI + [DONE].
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatCompletionResponse" }
            text/event-stream:
              schema: { type: string }
        "401": { description: sem X-Internal-Key válida }
        "422":
          description: request inválido
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessError" }
        "429": { description: rate limit excedido }
        "503": { description: backend indisponível ou circuito OPEN }
        "504": { description: deadline do request excedido }
  /v1/models:
    get:
      operationId: listModels
      security: [{ internalKey: [] }]
      responses:
        "200":
          description: modelos disponíveis (formato OpenAI)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelList" }
        "401": { description: sem X-Internal-Key válida }
        "503": { description: backend indisponível }
  /health:
    get:
      operationId: health
      responses:
        "200":
          description: liveness + readiness
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
  /metrics:
    get:
      operationId: metrics
      security: [{ internalKey: [] }]
      responses:
        "200":
          description: contadores + tokens + latências (source=live)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Metrics" }
        "401": { description: sem X-Internal-Key válida }
