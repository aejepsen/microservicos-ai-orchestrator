services:
  guardrails:
    build: .
    container_name: svc-guardrails
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      - INTERNAL_KEY=${INTERNAL_KEY:?INTERNAL_KEY obrigatoria (fail-closed)}
      - ALLOW_OPEN_ACCESS=${ALLOW_OPEN_ACCESS:-0}
      - OOD_ACTION=${OOD_ACTION:-flag}
      - OOD_REQUIRED=${OOD_REQUIRED:-0}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-120}
      - OTEL_ENABLED=${OTEL_ENABLED:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./models:/app/models
    restart: unless-stopped
