openapi: 3.1.0
info:
  title: svc-observability
  version: 1.0.0
  description: >
    Agregação de observabilidade do ecossistema: raspa /metrics dos serviços
    (fonte live), ingere resultados de eval (fonte eval), computa derivados
    (fonte estimate) e expõe visão unificada + exposição Prometheus. Auth interna.

servers:
  - url: http://localhost:8205

components:
  securitySchemes:
    internalKey:
      type: apiKey
      in: header
      name: X-Internal-Key
  schemas:
    BusinessError:
      type: object
      required: [error, detail, rule]
      properties:
        error: { type: string }
        detail: { type: string }
        rule: { type: string }
    Metric:
      type: object
      required: [name, value, source, service]
      properties:
        name: { type: string }
        value: { type: number }
        source: { type: string, enum: [live, eval, estimate] }
        service: { type: string }
        unit: { type: [string, "null"] }
        ts: { type: [string, "null"] }
        stale: { type: boolean, default: false }
    Overview:
      type: object
      required: [metrics, generated_at]
      properties:
        generated_at: { type: string }
        metrics:
          type: array
          items: { $ref: "#/components/schemas/Metric" }
    ServiceStatus:
      type: object
      required: [name, url, ok, n_metrics]
      properties:
        name: { type: string }
        url: { type: string }
        last_scrape: { type: [string, "null"] }
        ok: { type: boolean }
        n_metrics: { type: integer }
    RefreshResponse:
      type: object
      required: [scraped, ok, failed]
      properties:
        scraped: { type: integer }
        ok: { type: integer }
        failed: { type: integer }
    EvalMetricIn:
      type: object
      required: [name, value]
      properties:
        name: { type: string }
        value: { type: number }
        unit: { type: [string, "null"] }
    EvalResultIn:
      type: object
      required: [service, metrics, dataset_date]
      properties:
        service: { type: string }
        dataset_date: { type: string }
        metrics:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/EvalMetricIn" }
    EvalResultResponse:
      type: object
      required: [ingested]
      properties:
        ingested: { type: integer }
    Health:
      type: object
      required: [status, version, deps]
      properties:
        status: { type: string, enum: [ok, degraded] }
        version: { type: string }
        deps:
          type: object
          required: [upstreams_up, upstreams_total]
          properties:
            upstreams_up: { type: integer }
            upstreams_total: { type: integer }
    Metrics:
      type: object
      required: [source, scrapes_total, overviews_total, upstreams_up, latency_ms_p50, latency_ms_p95]
      properties:
        source: { type: string, enum: [live] }
        scrapes_total: { type: integer }
        overviews_total: { type: integer }
        upstreams_up: { type: integer }
        latency_ms_p50: { type: number }
        latency_ms_p95: { type: number }

paths:
  /v1/overview:
    get:
      operationId: overview
      security: [{ internalKey: [] }]
      responses:
        "200":
          description: snapshot unificado (cada métrica com source)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Overview" }
        "401": { description: sem X-Internal-Key válida }
  /v1/services:
    get:
      operationId: services
      security: [{ internalKey: [] }]
      responses:
        "200":
          description: upstreams registrados + status do último scrape
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ServiceStatus" }
        "401": { description: sem X-Internal-Key válida }
  /v1/refresh:
    post:
      operationId: refresh
      security: [{ internalKey: [] }]
      responses:
        "200":
          description: scrape de todos os upstreams
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefreshResponse" }
        "401": { description: sem X-Internal-Key válida }
  /v1/eval-results:
    post:
      operationId: ingestEval
      security: [{ internalKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvalResultIn" }
      responses:
        "200":
          description: métricas de eval ingeridas (source=eval)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvalResultResponse" }
        "401": { description: sem X-Internal-Key válida }
        "422":
          description: payload inválido
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessError" }
  /v1/prometheus:
    get:
      operationId: prometheus
      security: [{ internalKey: [] }]
      responses:
        "200":
          description: exposição em texto Prometheus
          content:
            text/plain:
              schema: { type: string }
        "401": { description: sem X-Internal-Key válida }
  /health:
    get:
      operationId: health
      responses:
        "200":
          description: liveness + readiness
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
  /metrics:
    get:
      operationId: metrics
      security: [{ internalKey: [] }]
      responses:
        "200":
          description: métricas do próprio serviço (source=live)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Metrics" }
        "401": { description: sem X-Internal-Key válida }
