services:
  observability:
    build: .
    container_name: svc-observability
    ports:
      - "127.0.0.1:8205:8205"
    environment:
      - INTERNAL_KEY=${INTERNAL_KEY:?INTERNAL_KEY obrigatoria (fail-closed)}
      - ALLOW_OPEN_ACCESS=${ALLOW_OPEN_ACCESS:-0}
      - UPSTREAM_KEY=${UPSTREAM_KEY:-}
      - SCRAPE_INTERVAL_S=${SCRAPE_INTERVAL_S:-0}
      - ALLOW_LOCAL_UPSTREAM=${ALLOW_LOCAL_UPSTREAM:-1}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-120}
      - OTEL_ENABLED=${OTEL_ENABLED:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
